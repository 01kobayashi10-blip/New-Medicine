# メール通知を使う場合の Repository secrets（未設定ならメールステップはスキップ）:
#   SMTP_HOST     例: smtp.gmail.com
#   SMTP_USER     送信に使うメールアドレス
#   SMTP_PASSWORD Gmail ならアプリパスワード（2 段階認証後に発行）
#   MAIL_TO       通知の受信先
# 任意: SMTP_PORT（未設定時はスクリプト側で 587）、MAIL_FROM（未設定時は SMTP_USER と同じ）、MAIL_SUBJECT
# 任意: Notify Email の env — INFOGRAPHIC_URL で図解を本文に直リンク（GitHub 上の HTML）。
#       INFOGRAPHIC_ATTACH=0 と併用すると添付なし・本文リンクのみ。
# 通知: 定期実行は「コミットがあったとき」のみ。手動（workflow_dispatch）はその時点の内容を送るため常に試行する。
name: Mix Online 発売記事レポート

on:
  schedule:
    # 毎日 00:15 UTC（日本時間 09:15 前後。DST で変動）
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: new-drug-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - id: fetch
        name: Fetch RSS and update report
        run: python scripts/fetch_and_report.py
        env:
          RSS_URL: https://www.mixonline.jp/DesktopModules/MixOnline_Rss/MixOnlinerss.aspx?rssmode=3
          # メール/Slack に載せる「発売」記事の直近件数（既定 5）
          EMAIL_TOP_N: "5"

      - name: Validate PMDA JSON
        if: success()
        run: python scripts/validate_pmda_data.py

      - id: generate
        name: Generate PMDA infographic HTML
        if: success()
        run: python scripts/generate_pmda_infographics.py

      - id: commit
        name: Commit and push if changed
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed_items.json data/pmda_overrides.json data/pmda_multi_candidates.json \
            reports/latest.html
          # 新規なしでは fetch が generate_queue を削除する。未追跡かつファイル無しのとき git add は失敗するため分岐する。
          if [ -f reports/generate_queue.json ]; then
            git add reports/generate_queue.json
          elif git ls-files --error-unmatch reports/generate_queue.json >/dev/null 2>&1; then
            git add reports/generate_queue.json
          fi
          find reports -maxdepth 1 -name 'infographic_*.html' -print0 | xargs -0 -r git add
          if git diff --staged --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes to commit."
            exit 0
          fi
          MSG="chore: update 発売記事レポート (${NEW_COUNT} 件新規)"
          git commit -m "$MSG"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"
        env:
          NEW_COUNT: ${{ steps.fetch.outputs.new_count }}

      - name: Notify Slack
        if: success() && (steps.commit.outputs.committed == 'true' || github.event_name == 'workflow_dispatch')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEW_COUNT: ${{ steps.fetch.outputs.new_count }}
          LINK: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/reports/latest.html
        run: python scripts/notify_slack.py

      - name: Notify Email
        if: success() && (steps.commit.outputs.committed == 'true' || github.event_name == 'workflow_dispatch')
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_SUBJECT: "Mix Online 発売記事: 新規検出"
          NEW_COUNT: ${{ steps.fetch.outputs.new_count }}
          LINK: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/reports/latest.html
          # 図解（先頭 1 件・htmlpreview）。generate スクリプトが GITHUB_OUTPUT に書く完全 URL。
          INFOGRAPHIC_URL: ${{ steps.generate.outputs.infographic_url }}
          INFOGRAPHIC_ATTACH: "0"
        run: python scripts/send_report_email.py
